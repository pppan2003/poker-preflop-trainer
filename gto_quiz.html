<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>千算大學 GTO 背誦 App</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a2332; color: #e8e8e8; min-height: 100vh; }

/* NAV */
.nav { display: flex; align-items: center; justify-content: space-between; background: #0f1923; padding: 10px 16px; border-bottom: 2px solid #2d4a6e; flex-wrap: wrap; gap: 6px; }
.nav-title { font-size: 16px; font-weight: 700; color: #4db8ff; }
.nav-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.tab-btn { padding: 5px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; background: #1e3a5f; color: #8ab4d4; }
.tab-btn.active { background: #2d6ea0; color: #fff; }
.tab-btn:hover:not(.active) { background: #254d75; }

/* SCREENS */
.screen { display: none; padding: 14px 16px; max-width: 920px; margin: 0 auto; }
.screen.active { display: block; }

/* ACTION COLORS — shared */
:root {
  --c-raise:      #c0392b;
  --c-call:       #1e8449;
  --c-fold:       #1a2840;
  --c-raise_call: #1f6fbf;
  --c-raise_fold: #c47a0a;
  --c-call_fold:  #7d3c98;
}
.ac-raise      { background: var(--c-raise)!important;      color:#fff!important; }
.ac-call       { background: var(--c-call)!important;       color:#fff!important; }
.ac-fold       { background: var(--c-fold)!important;       color:#4a7090!important; }
.ac-raise_call { background: var(--c-raise_call)!important; color:#fff!important; }
.ac-raise_fold { background: var(--c-raise_fold)!important; color:#fff!important; }
.ac-call_fold  { background: var(--c-call_fold)!important;  color:#fff!important; }

/* ======== HOME ======== */
.home-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.home-title { font-size: 20px; font-weight: 700; color: #4db8ff; }
.home-sub { font-size: 12px; color: #7aafcf; margin-top: 3px; }
.home-btns { display:flex; gap:7px; flex-wrap:wrap; }
.h-btn { padding: 7px 15px; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; }
.h-btn.green { background: #2d8a4e; color: #fff; }
.h-btn.blue  { background: #1a4d78; color: #fff; }
.h-btn:hover { filter: brightness(1.15); }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-btn { padding: 4px 10px; border-radius: 20px; border: 1px solid #2d4a6e; background: #1a2332; color: #7aafcf; font-size: 11px; cursor: pointer; }
.filter-btn.active { background: #2d6ea0; color: #fff; border-color: #2d6ea0; }
.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 9px; }
.sc-card { background: #1e3a5f; border-radius: 9px; padding: 11px 13px; cursor: pointer; border: 2px solid transparent; transition: all 0.12s; }
.sc-card:hover { border-color: #4db8ff; background: #254d75; }
.sc-name { font-weight: 700; font-size: 12px; color: #e0f0ff; margin-bottom: 5px; }
.sc-stat { font-size: 10px; color: #7aafcf; }
.sc-bar  { height: 4px; background: #0f1923; border-radius: 3px; margin-top: 6px; overflow: hidden; }
.sc-bar-fill { height: 100%; background: #4caf50; border-radius: 3px; }

/* ======== HAND QUIZ ======== */
.q-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.q-sc-lbl { font-size: 11px; color: #7aafcf; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.q-prog   { font-size: 11px; color: #7aafcf; }
.stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
.stat-chip { background: #0f1923; border-radius: 7px; padding: 5px 11px; font-size: 12px; font-weight: 600; }
.stat-chip .val { color: #4db8ff; }
.hand-card { background: #1e3a5f; border-radius: 14px; padding: 30px 20px; text-align: center; margin-bottom: 16px; border: 2px solid #2d4a6e; }
.hand-lbl { font-size: 11px; color: #7aafcf; margin-bottom: 8px; letter-spacing: 1px; }
.hand-big { font-size: 50px; font-weight: 900; color: #fff; letter-spacing: 2px; font-family: monospace; }
.act-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
.act-btn { padding: 12px 6px; border-radius: 8px; border: 2px solid transparent; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.12s; }
.act-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
.act-btn:disabled { opacity: 0.45; cursor: default; transform: none; }
.act-btn.raise      { background: var(--c-raise);      color:#fff; border-color:#e05050; }
.act-btn.call       { background: var(--c-call);       color:#fff; border-color:#40c078; }
.act-btn.fold       { background: #2c3e50;              color:#ccc; border-color:#4a6278; }
.act-btn.raise_call { background: var(--c-raise_call); color:#fff; border-color:#3080c0; }
.act-btn.raise_fold { background: var(--c-raise_fold); color:#fff; border-color:#d07820; }
.act-btn.call_fold  { background: var(--c-call_fold);  color:#fff; border-color:#9b59b6; }
.act-btn.is-correct { box-shadow: 0 0 0 3px #2ecc71; }
.act-btn.is-wrong   { box-shadow: 0 0 0 3px #e74c3c; opacity: 0.45; }
.fb-box { border-radius: 8px; padding: 11px 14px; margin-bottom: 10px; display: none; }
.fb-box.ok  { background: #1a4a2e; border: 1px solid #2ecc71; color: #7defa1; }
.fb-box.bad { background: #4a1a1a; border: 1px solid #e74c3c; color: #f0a0a0; }
.fb-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.fb-sub   { font-size: 11px; }
.next-btn { width: 100%; padding: 11px; background: #2d6ea0; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; display: none; }
.next-btn:hover { background: #3a84c0; }

/* ======== GRID PRACTICE ======== */
.gp-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.gp-sc-name { font-size: 15px; font-weight: 700; color: #e0f0ff; }
.gp-rand-btn { padding: 5px 12px; background: #1e3a5f; color: #4db8ff; border: 1px solid #2d6ea0; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
.gp-rand-btn:hover { background: #254d75; }

/* Paint toolbar */
.paint-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.paint-lbl { font-size: 11px; color: #7aafcf; margin-right: 2px; white-space: nowrap; }
.paint-btn { padding: 7px 13px; border-radius: 7px; border: 2px solid transparent; font-size: 12px; font-weight: 700; cursor: pointer; opacity: 0.6; transition: all 0.12s; }
.paint-btn:hover { opacity: 0.85; }
.paint-btn.active { opacity: 1; border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); transform: translateY(-1px); }
.paint-btn.raise      { background: var(--c-raise);      color:#fff; }
.paint-btn.call       { background: var(--c-call);       color:#fff; }
.paint-btn.raise_call { background: var(--c-raise_call); color:#fff; }
.paint-btn.raise_fold { background: var(--c-raise_fold); color:#fff; }
.paint-btn.call_fold  { background: var(--c-call_fold);  color:#fff; }
.paint-btn.fold       { background: #2c3e50; color:#ccc; border-color:#4a6278; }

/* Grid */
.gp-grid-wrap { overflow-x: auto; margin-bottom: 10px; }
.gp-grid { display: grid; grid-template-columns: repeat(13,1fr); gap: 2.5px; min-width: 455px; user-select: none; -webkit-user-select: none; }
.gp-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; border-radius: 4px; cursor: pointer;
  font-family: monospace;
  background: #1a2840; color: #3a5878;
  border: 1.5px solid transparent;
  transition: border-color 0.08s, transform 0.08s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.gp-cell:hover { border-color: rgba(77,184,255,0.5); }
.gp-cell:active { transform: scale(0.93); }
.gp-grid.dragging .gp-cell { cursor: crosshair; }

/* After submit: result overlay */
.gp-cell .result-tag {
  position: absolute; top: 0; right: 0; left: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 13px; line-height: 1.1;
  pointer-events: none; background: rgba(0,0,0,0.45); border-radius: 4px;
}

/* Legend */
.gp-legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 11px; color: #7aafcf; margin-bottom: 10px; }
.gp-legend span { display: flex; align-items: center; gap: 4px; }
.leg-swatch { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }

/* Bottom bar */
.gp-bottom { display: flex; gap: 8px; margin-bottom: 10px; }
.gp-submit { flex:1; padding: 12px; background: #2d8a4e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
.gp-submit:hover:not(:disabled) { background: #38a05e; }
.gp-submit:disabled { opacity: 0.4; cursor: default; }
.gp-next { flex:1; padding: 12px; background: #2d6ea0; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; display: none; }
.gp-next:hover { background: #3a84c0; }
.gp-clear { padding: 12px 16px; background: #1e2f45; color: #7aafcf; border: 1px solid #2d4a6e; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.gp-clear:hover { background: #254d75; }

/* Result box */
.gp-result { border-radius: 9px; padding: 13px 16px; display: none; }
.gp-result.perfect { background: #1a4a2e; border: 1px solid #2ecc71; }
.gp-result.good    { background: #383000; border: 1px solid #e0a020; }
.gp-result.bad     { background: #4a1a1a; border: 1px solid #e74c3c; }
.gp-res-title  { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.gp-res-detail { font-size: 12px; color: #b0c0d0; line-height: 1.7; }
.gp-sc-select { background: #1e3a5f; color: #e0f0ff; border: 1px solid #2d4a6e; padding: 7px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; width: 100%; margin-bottom: 10px; }
.gp-stat-row { display: flex; gap: 10px; margin-bottom: 10px; }

/* ======== MATRIX ======== */
.mx-select { background: #1e3a5f; color: #e0f0ff; border: 1px solid #2d4a6e; padding: 7px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; width: 100%; margin-bottom: 10px; }
.mx-title  { font-size: 15px; font-weight: 700; color: #4db8ff; margin-bottom: 9px; }
.mx-wrap   { overflow-x: auto; }
.mx-grid   { display: grid; grid-template-columns: repeat(13,1fr); gap: 2.5px; min-width: 455px; }
.mx-cell   { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border-radius: 4px; font-family: monospace; cursor: default; }
.mx-cell:hover { transform: scale(1.15); z-index: 1; position: relative; }
.mx-legend { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 10px; }
.mx-leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; }
.mx-leg-dot  { width: 12px; height: 12px; border-radius: 3px; }

/* ======== STATS ======== */
.st-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.st-h   { font-size: 17px; font-weight: 700; color: #4db8ff; }
.rst-all { padding: 5px 11px; background: #4a1a1a; color: #f07d7d; border: 1px solid #e74c3c; border-radius: 6px; font-size: 11px; cursor: pointer; }
.st-table { width: 100%; border-collapse: collapse; }
.st-table th { text-align: left; padding: 6px 9px; background: #0f1923; color: #7aafcf; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.st-table td { padding: 6px 9px; border-bottom: 1px solid #1e3a5f; font-size: 12px; }
.st-table tr:hover td { background: #1e2f45; }
.pill { padding: 2px 7px; border-radius: 20px; font-weight: 700; font-size: 11px; }
.pill.hi { background: #1a4a2e; color: #7defa1; }
.pill.md { background: #4a3a1a; color: #f0c87d; }
.pill.lo { background: #4a1a1a; color: #f07d7d; }
.pill.na { background: #1a2332; color: #7aafcf; }
.rst-sc { padding: 2px 7px; background: #1e2f45; color: #7aafcf; border: 1px solid #2d4a6e; border-radius: 4px; font-size: 10px; cursor: pointer; }
.rst-sc:hover { background: #4a1a1a; color: #f07d7d; }

@media (max-width: 500px) {
  .act-grid { grid-template-columns: repeat(2,1fr); }
  .hand-big { font-size: 36px; }
}
</style>
</head>
<body>

<div class="nav">
  <span class="nav-title">千算 GTO ♠</span>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showScreen('home')">主頁</button>
    <button class="tab-btn" onclick="showScreen('quiz')">手牌練習</button>
    <button class="tab-btn" onclick="showScreen('grid')">格子練習</button>
    <button class="tab-btn" onclick="showScreen('matrix')">範圍表</button>
    <button class="tab-btn" onclick="showScreen('stats')">統計</button>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-header">
    <div><div class="home-title">GTO Preflop 範圍</div><div class="home-sub" id="home-sub">-</div></div>
    <div class="home-btns">
      <button class="h-btn blue" onclick="startGrid(null)">格子練習 ▶</button>
      <button class="h-btn green" onclick="startQuiz(null)">手牌練習 ▶</button>
    </div>
  </div>
  <div class="filter-row" id="filter-row"></div>
  <div class="home-grid" id="home-grid"></div>
</div>

<!-- HAND QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="q-top">
    <div class="q-sc-lbl" id="q-sc-lbl">-</div>
    <div class="q-prog"   id="q-prog">-</div>
  </div>
  <div class="stat-row">
    <div class="stat-chip">✓ <span class="val" id="hq-cor">0</span></div>
    <div class="stat-chip">✗ <span class="val" id="hq-wrg">0</span></div>
    <div class="stat-chip">🔥 <span class="val" id="hq-str">0</span></div>
  </div>
  <div class="hand-card">
    <div class="hand-lbl">你的手牌</div>
    <div class="hand-big" id="q-hand">--</div>
  </div>
  <div class="act-grid">
    <button class="act-btn raise"      onclick="hqAns('raise')">加注</button>
    <button class="act-btn call"       onclick="hqAns('call')">跟注</button>
    <button class="act-btn fold"       onclick="hqAns('fold')">棄牌</button>
    <button class="act-btn raise_call" onclick="hqAns('raise_call')">加 / 跟</button>
    <button class="act-btn raise_fold" onclick="hqAns('raise_fold')">加 / 棄</button>
    <button class="act-btn call_fold"  onclick="hqAns('call_fold')">跟 / 棄</button>
  </div>
  <div class="fb-box" id="hq-fb">
    <div class="fb-title" id="hq-fb-t"></div>
    <div class="fb-sub"   id="hq-fb-s"></div>
  </div>
  <button class="next-btn" id="hq-nxt" onclick="hqNext()">下一題 →</button>
</div>

<!-- GRID PRACTICE -->
<div id="screen-grid" class="screen">
  <div class="gp-top">
    <div class="gp-sc-name" id="gp-sc-name">-</div>
    <button class="gp-rand-btn" onclick="gpRandScenario()">隨機場景 ⟳</button>
  </div>

  <select class="gp-sc-select" id="gp-sc-sel" onchange="gpScChange()"></select>

  <!-- Paint toolbar -->
  <div class="paint-bar" id="paint-bar">
    <span class="paint-lbl">油漆：</span>
  </div>

  <!-- % bar -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
    <div style="flex:1;background:#0f1923;border-radius:8px;height:20px;overflow:hidden;min-width:120px">
      <div id="gp-pct-bar-fill" style="height:100%;background:#2d6ea0;border-radius:8px;width:0%;transition:width 0.1s"></div>
    </div>
    <div style="font-size:13px;font-weight:700;color:#4db8ff;white-space:nowrap">
      範圍：<span id="gp-pct-label">0.0%</span>
    </div>
  </div>

  <!-- Grid -->
  <div class="gp-grid-wrap">
    <div class="gp-grid" id="gp-grid"></div>
  </div>

  <!-- Legend -->
  <div class="gp-legend" id="gp-legend">
    <span><span class="leg-swatch ac-raise"></span>加注</span>
    <span><span class="leg-swatch ac-call"></span>跟注</span>
    <span><span class="leg-swatch ac-raise_call"></span>加/跟</span>
    <span><span class="leg-swatch ac-raise_fold"></span>加/棄</span>
    <span><span class="leg-swatch ac-call_fold"></span>跟/棄</span>
    <span><span class="leg-swatch ac-fold"></span>棄牌</span>
  </div>

  <!-- Buttons -->
  <div class="gp-bottom">
    <button class="gp-clear" onclick="gpClear()" id="gp-clear-btn">清除</button>
    <button class="gp-submit" id="gp-sub-btn" onclick="gpSubmit()">提交答案</button>
    <button class="gp-next"   id="gp-nxt-btn" onclick="gpNext()">下一個 →</button>
  </div>

  <!-- Result -->
  <div class="gp-result" id="gp-result">
    <div class="gp-res-title"  id="gp-res-title"></div>
    <div class="gp-res-detail" id="gp-res-detail"></div>
  </div>
</div>

<!-- MATRIX -->
<div id="screen-matrix" class="screen">
  <select class="mx-select" id="mx-sel" onchange="renderMatrix()"></select>
  <div class="mx-title" id="mx-title"></div>
  <div class="mx-wrap"><div class="mx-grid" id="mx-grid"></div></div>
  <div class="mx-legend">
    <div class="mx-leg-item"><div class="mx-leg-dot ac-raise"></div>純加注</div>
    <div class="mx-leg-item"><div class="mx-leg-dot ac-call"></div>純跟注</div>
    <div class="mx-leg-item"><div class="mx-leg-dot ac-raise_call"></div>加注/跟注</div>
    <div class="mx-leg-item"><div class="mx-leg-dot ac-raise_fold"></div>加注/棄牌</div>
    <div class="mx-leg-item"><div class="mx-leg-dot ac-call_fold"></div>跟注/棄牌</div>
    <div class="mx-leg-item"><div class="mx-leg-dot ac-fold" style="border:1px solid #2d4a6e"></div>棄牌</div>
  </div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="st-top">
    <div class="st-h">學習統計</div>
    <div style="display:flex;gap:7px">
      <button class="h-btn blue" onclick="startWeaknessDrill()" style="font-size:11px;padding:5px 12px">🎯 弱點練習</button>
      <button class="rst-all" onclick="resetStats()">重置全部</button>
    </div>
  </div>
  <!-- Weakness summary -->
  <div id="weakness-box" style="display:none;background:#1e2f45;border-radius:9px;padding:12px 14px;margin-bottom:12px;font-size:12px">
    <div style="font-weight:700;color:#f0c87d;margin-bottom:8px">⚠️ 最常犯錯手牌 Top 10</div>
    <div id="weakness-list"></div>
  </div>
  <table class="st-table">
    <thead><tr><th>場景</th><th>作答</th><th>正確率</th><th></th></tr></thead>
    <tbody id="st-body"></tbody>
  </table>

// ===== STORAGE =====
function loadSt() { try{return JSON.parse(localStorage.getItem('gto2')||'{}')}catch(e){return{}} }
function saveSt(s){ localStorage.setItem('gto2',JSON.stringify(s)) }
function recRes(name,ok){ const s=loadSt(); if(!s[name])s[name]={c:0,t:0}; s[name].t++; if(ok)s[name].c++; saveSt(s); }
function getSt(name){ return loadSt()[name]||{c:0,t:0}; }

// ===== NAV =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
  const tabs=['home','quiz','grid','matrix','stats'];
  document.querySelectorAll('.tab-btn')[tabs.indexOf(id)].classList.add('active');
  if(id==='home')   renderHome();
  if(id==='grid')   gpInit();
  if(id==='matrix') mxInit();
  if(id==='stats')  renderStats();
}

// ===== HOME =====
let homeFilt='all';
function renderHome(){
  const st=loadSt();
  const tot=Object.values(st).reduce((a,v)=>a+v.t,0);
  const cor=Object.values(st).reduce((a,v)=>a+v.c,0);
  document.getElementById('home-sub').textContent=
    tot ? '總計 '+tot+' 題 · 正確率 '+Math.round(cor/tot*100)+'%' : '尚未開始練習';
  const fr=document.getElementById('filter-row');
  fr.innerHTML='';
  const addF=(lbl,k)=>{
    const b=document.createElement('button');
    b.className='filter-btn'+(homeFilt===k?' active':'');
    b.textContent=lbl; b.onclick=()=>{homeFilt=k;renderHome();};
    fr.appendChild(b);
  };
  addF('全部','all'); Object.keys(CATS).forEach(k=>addF(k,k));
  const grid=document.getElementById('home-grid');
  grid.innerHTML='';
  let scs=GTO;
  if(homeFilt!=='all'){const fn=CATS[homeFilt];if(fn)scs=scs.filter(fn);}
  scs.forEach(sc=>{
    const s=getSt(sc.name);
    const pct=s.t?Math.round(s.c/s.t*100):0;
    const card=document.createElement('div');
    card.className='sc-card';
    card.innerHTML='<div class="sc-name">'+sc.name+'</div>'
      +'<div class="sc-stat">'+(s.t?pct+'% ('+s.c+'/'+s.t+')':'未練習')+'</div>'
      +'<div class="sc-bar"><div class="sc-bar-fill" style="width:'+pct+'%"></div></div>';
    card.onclick=()=>startGrid([GTO.indexOf(sc)]);
    grid.appendChild(card);
  });
}

// ===== HAND QUIZ =====
let hqPool=[],hqIdx=0,hqCor=0,hqWrg=0,hqStr=0,hqCur=null,hqDone=false,hqFlat=[];
function startQuiz(indices){
  hqPool=indices===null?GTO.map((_,i)=>i):indices;
  hqCor=0;hqWrg=0;hqStr=0;hqDone=false;
  ['hq-cor','hq-wrg','hq-str'].forEach(id=>document.getElementById(id).textContent='0');
  showScreen('quiz');
  hqBuild(); hqNext();
}
function hqBuild(){
  hqFlat=[];
  hqPool.forEach(idx=>{
    const sc=GTO[idx];
    Object.entries(sc.hands).forEach(([h,a])=>{ if(a!=='fold')hqFlat.push({idx,h,a}); });
    const folds=Object.entries(sc.hands).filter(([h,a])=>a==='fold');
    const n=Math.ceil(folds.length*0.25);
    for(let i=0;i<n;i++){const ri=Math.floor(Math.random()*folds.length);hqFlat.push({idx,h:folds[ri][0],a:'fold'});}
  });
  hqFlat.sort(()=>Math.random()-0.5); hqIdx=0;
}
function hqNext(){
  hqDone=false;
  if(hqIdx>=hqFlat.length)hqBuild();
  hqCur=hqFlat[hqIdx++];
  document.getElementById('q-sc-lbl').textContent=GTO[hqCur.idx].name;
  document.getElementById('q-prog').textContent=hqIdx+' / '+hqFlat.length;
  document.getElementById('q-hand').textContent=hqCur.h;
  document.querySelectorAll('.act-btn').forEach(b=>{b.disabled=false;b.classList.remove('is-correct','is-wrong');});
  const fb=document.getElementById('hq-fb');
  fb.style.display='none'; fb.className='fb-box';
  document.getElementById('hq-nxt').style.display='none';
}
function hqAns(chosen){
  if(hqDone)return; hqDone=true;
  const ok=chosen===hqCur.a;
  if(ok){hqCor++;hqStr++;}else{hqWrg++;hqStr=0;}
  document.getElementById('hq-cor').textContent=hqCor;
  document.getElementById('hq-wrg').textContent=hqWrg;
  document.getElementById('hq-str').textContent=hqStr;
  recRes(GTO[hqCur.idx].name,ok);
  document.querySelectorAll('.act-btn').forEach(b=>{
    b.disabled=true;
    const a=b.className.match(/raise_call|raise_fold|call_fold|raise|call|fold/)?.[0];
    if(a===hqCur.a) b.classList.add('is-correct');
    else if(a===chosen&&!ok) b.classList.add('is-wrong');
  });
  const fb=document.getElementById('hq-fb');
  fb.style.display='block'; fb.className='fb-box '+(ok?'ok':'bad');
  document.getElementById('hq-fb-t').textContent=ok?'✓ 正確！':'✗ 錯誤';
  document.getElementById('hq-fb-s').textContent=ok?'繼續！':'正確：'+AL[hqCur.a];
  document.getElementById('hq-nxt').style.display='block';
}

// ===== GRID PRACTICE =====
let gpIdx=0, gpPaint='raise', gpMap={}, gpSubmitted=false, gpWeakHands=new Set();

function gpInit(){
  const sel=document.getElementById('gp-sc-sel');
  if(!sel.options.length){
    GTO.forEach((sc,i)=>{const o=document.createElement('option');o.value=i;o.textContent=sc.name;sel.appendChild(o);});
  }
  gpIdx=parseInt(sel.value)||0;
  gpBuildPaintBar();
  gpRenderGrid();
}

function startGrid(indices){
  showScreen('grid');
  const sel=document.getElementById('gp-sc-sel');
  if(!sel.options.length){
    GTO.forEach((sc,i)=>{const o=document.createElement('option');o.value=i;o.textContent=sc.name;sel.appendChild(o);});
  }
  if(indices&&indices.length){
    gpIdx=indices[0]; sel.value=gpIdx;
  } else {
    gpIdx=Math.floor(Math.random()*GTO.length); sel.value=gpIdx;
  }
  gpBuildPaintBar();
  gpRenderGrid();
}

function gpRandScenario(){
  const sel=document.getElementById('gp-sc-sel');
  gpIdx=Math.floor(Math.random()*GTO.length);
  sel.value=gpIdx;
  gpBuildPaintBar();
  gpRenderGrid();
}

function gpScChange(){
  gpIdx=parseInt(document.getElementById('gp-sc-sel').value);
  gpBuildPaintBar();
  gpRenderGrid();
}

function gpBuildPaintBar(){
  const bar=document.getElementById('paint-bar');
  bar.innerHTML='<span class="paint-lbl">油漆：</span>';
  ALL_ACTIONS.forEach(a=>{
    const b=document.createElement('button');
    b.className='paint-btn '+a+(gpPaint===a?' active':'');
    b.textContent=AL[a];
    b.onclick=()=>{ gpPaint=a; gpBuildPaintBar(); };
    bar.appendChild(b);
  });
}

function gpRenderGrid(){
  gpSubmitted=false;
  gpMap={};
  document.getElementById('gp-sc-name').textContent=GTO[gpIdx].name;
  const grid=document.getElementById('gp-grid');
  grid.innerHTML='';
  HANDS.forEach(h=>{
    const cell=document.createElement('div');
    cell.className='gp-cell ac-fold';
    cell.textContent=h;
    cell.dataset.hand=h;
    if(gpWeakHands.has(h)) cell.style.outline='2px solid #f0c87d';
    else cell.style.outline='';
    cell.addEventListener('mousedown', gpCellDown);
    cell.addEventListener('mousemove', gpCellMove);
    cell.addEventListener('touchstart', gpTouchStart, {passive:false});
    cell.addEventListener('touchmove',  gpTouchMove,  {passive:false});
    grid.appendChild(cell);
  });
  gpUpdatePct();
  // Reset result
  const rb=document.getElementById('gp-result');
  rb.style.display='none'; rb.className='gp-result';
  document.getElementById('gp-sub-btn').style.display='';
  document.getElementById('gp-sub-btn').disabled=false;
  document.getElementById('gp-nxt-btn').style.display='none';
  document.getElementById('gp-clear-btn').style.display='';
}

// ---- Drag paint state ----
let gpDragging = false;
let gpDragAction = null; // action to apply during this drag

const MIX_ACTIONS = new Set(['raise_call','raise_fold','call_fold']);
function gpCalcPct(){
  let w = 0;
  Object.values(gpMap).forEach(a => {
    if(a === 'fold') return;
    w += MIX_ACTIONS.has(a) ? 0.5 : 1;
  });
  return w / 169 * 100;
}
function gpUpdatePct(){
  const pct = gpCalcPct();
  document.getElementById('gp-pct-label').textContent = pct.toFixed(1) + '%';
  document.getElementById('gp-pct-bar-fill').style.width = Math.min(pct, 100) + '%';
}

function gpApplyPaint(cell, action){
  const h = cell.dataset.hand;
  gpMap[h] = action;
  cell.className = 'gp-cell ac-' + action;
  gpUpdatePct();
}

function gpCellDown(e){
  if(gpSubmitted) return;
  e.preventDefault();
  gpDragging = true;
  // Toggle: if cell already has current paint → erase to fold, else paint
  const prev = gpMap[this.dataset.hand] || 'fold';
  gpDragAction = (prev === gpPaint) ? 'fold' : gpPaint;
  gpApplyPaint(this, gpDragAction);
}

function gpCellMove(e){
  if(!gpDragging || gpSubmitted) return;
  gpApplyPaint(this, gpDragAction);
}

function gpTouchStart(e){
  if(gpSubmitted) return;
  e.preventDefault();
  gpDragging = true;
  const prev = gpMap[this.dataset.hand] || 'fold';
  gpDragAction = (prev === gpPaint) ? 'fold' : gpPaint;
  gpApplyPaint(this, gpDragAction);
}

function gpTouchMove(e){
  if(!gpDragging || gpSubmitted) return;
  e.preventDefault();
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  if(el && el.classList.contains('gp-cell')) gpApplyPaint(el, gpDragAction);
}

document.addEventListener('mouseup', () => {
  gpDragging = false;
  document.getElementById('gp-grid').classList.remove('dragging');
});
document.addEventListener('touchend', () => {
  gpDragging = false;
  document.getElementById('gp-grid').classList.remove('dragging');
});

// Add dragging class while mouse is held so cursor changes
document.addEventListener('mousedown', e => {
  if(e.target.classList.contains('gp-cell')) {
    document.getElementById('gp-grid').classList.add('dragging');
  }
});

function gpClear(){
  gpMap={};
  document.querySelectorAll('#gp-grid .gp-cell').forEach(c=>{
    c.className='gp-cell ac-fold';
    const tag=c.querySelector('.result-tag');
    if(tag) c.removeChild(tag);
  });
  gpUpdatePct();
}

const ACTION_PARTS = {
  raise:['raise'], call:['call'], fold:['fold'],
  raise_call:['raise','call'], raise_fold:['raise','fold'], call_fold:['call','fold']
};
function actResult(user, real) {
  if (user === real) return 'correct';
  const pu = new Set(ACTION_PARTS[user]);
  return ACTION_PARTS[real].some(p => pu.has(p)) ? 'warn' : 'wrong';
}
const ACT_LABEL = {raise:'加注',call:'跟注',fold:'棄牌',raise_call:'加/跟',raise_fold:'加/棄',call_fold:'跟/棄'};

function gpRecordMistake(scenario, hand, userAct, realAct){
  const key='gto_mistakes';
  let m; try{m=JSON.parse(localStorage.getItem(key)||'{}')}catch(e){m={};}
  if(!m[scenario]) m[scenario]={};
  if(!m[scenario][hand]) m[scenario][hand]={count:0,last_user:'',real:''};
  m[scenario][hand].count++;
  m[scenario][hand].last_user=userAct;
  m[scenario][hand].real=realAct;
  localStorage.setItem(key,JSON.stringify(m));
}

function gpSubmit(){
  gpSubmitted=true;
  const sc=GTO[gpIdx];
  let correct=0, wrong=0, warnCount=0, wrongCount=0, total=169;

  document.querySelectorAll('#gp-grid .gp-cell').forEach(c=>{
    const h=c.dataset.hand;
    const userAct=gpMap[h]||'fold';
    const realAct=sc.hands[h]||'fold';
    const res=actResult(userAct,realAct);

    const oldTag=c.querySelector('.result-tag');
    if(oldTag) c.removeChild(oldTag);

    if(res==='correct'){
      correct++;
    } else {
      wrong++;
      if(res==='warn') warnCount++; else wrongCount++;
      gpRecordMistake(sc.name, h, userAct, realAct);
      const tag=document.createElement('span');
      tag.className='result-tag';
      tag.innerHTML=(res==='warn'?'⚠️':'❌')
        +'<small style="font-size:5px;display:block;margin-top:1px;line-height:1">'+ACT_LABEL[realAct]+'</small>';
      c.appendChild(tag);
    }
  });

  const pct=Math.round(correct/total*100);
  const isPerfect=wrong===0;
  const isGood=pct>=80;
  recRes(sc.name,isGood);

  const rb=document.getElementById('gp-result');
  rb.style.display='block';
  rb.className='gp-result '+(isPerfect?'perfect':isGood?'good':'bad');
  document.getElementById('gp-res-title').textContent=isPerfect?'🎯 完美！':isGood?'👍 不錯 ('+pct+'%)':'需要加強 ('+pct+'%)';
  document.getElementById('gp-res-detail').innerHTML=
    '✅ 正確：'+correct+' / 169'
    +(warnCount>0?'<br>⚠️ 部份正確（方向啱，但純/混合策略未準）：'+warnCount+' 個':'')
    +(wrongCount>0?'<br>❌ 完全錯誤：'+wrongCount+' 個':'');

  document.getElementById('gp-sub-btn').style.display='none';
  document.getElementById('gp-clear-btn').style.display='none';
  document.getElementById('gp-nxt-btn').style.display='';
}

function gpNext(){
  gpWeakHands=new Set();
  gpRandScenario();
}

// ===== MATRIX =====
function mxInit(){
  const sel=document.getElementById('mx-sel');
  if(!sel.options.length){
    GTO.forEach((sc,i)=>{const o=document.createElement('option');o.value=i;o.textContent=sc.name;sel.appendChild(o);});
  }
  renderMatrix();
}
function renderMatrix(){
  const sel=document.getElementById('mx-sel');
  const sc=GTO[parseInt(sel.value)];
  document.getElementById('mx-title').textContent=sc.name;
  const grid=document.getElementById('mx-grid');
  grid.innerHTML='';
  HANDS.forEach(h=>{
    const a=sc.hands[h]||'fold';
    const cell=document.createElement('div');
    cell.className='mx-cell ac-'+a;
    cell.textContent=h;
    cell.title=h+': '+AL[a];
    grid.appendChild(cell);
  });
}

// ===== WEAKNESS TRACKING =====
function loadMistakes(){ try{return JSON.parse(localStorage.getItem('gto_mistakes')||'{}')}catch(e){return{}} }

function getTopMistakes(n){
  const m=loadMistakes();
  const flat=[];
  Object.entries(m).forEach(([sc,hands])=>{
    Object.entries(hands).forEach(([hand,info])=>{
      flat.push({sc,hand,count:info.count,last_user:info.last_user,real:info.real});
    });
  });
  return flat.sort((a,b)=>b.count-a.count).slice(0,n);
}

function startWeaknessDrill(){
  const top=getTopMistakes(20);
  if(!top.length){ alert('尚未有錯誤記錄，先做幾輪格子練習！'); return; }
  // Find scenarios that contain the most weak hands
  const scCount={};
  top.forEach(t=>{ scCount[t.sc]=(scCount[t.sc]||0)+1; });
  const bestSc=Object.entries(scCount).sort((a,b)=>b[1]-a[1])[0][0];
  const idx=GTO.findIndex(s=>s.name===bestSc);
  if(idx<0) return;
  gpWeakHands=new Set(top.filter(t=>t.sc===bestSc).map(t=>t.hand));
  startGrid([idx]);
}

// ===== STATS =====
function renderStats(){
  const st=loadSt();
  const tbody=document.getElementById('st-body');
  tbody.innerHTML='';
  GTO.forEach(sc=>{
    const s=st[sc.name]||{c:0,t:0};
    const pct=s.t?Math.round(s.c/s.t*100):null;
    let pc='na',pt='未練習';
    if(pct!==null){pt=pct+'%';pc=pct>=80?'hi':pct>=50?'md':'lo';}
    const tr=document.createElement('tr');
    tr.innerHTML='<td>'+sc.name+'</td><td>'+(s.t||'-')+'</td>'
      +'<td><span class="pill '+pc+'">'+pt+'</span></td>'
      +'<td><button class="rst-sc" onclick="rstSc('+JSON.stringify(sc.name)+')">重置</button></td>';
    tbody.appendChild(tr);
  });
  // Weakness top 10
  const top=getTopMistakes(10);
  const wb=document.getElementById('weakness-box');
  const wl=document.getElementById('weakness-list');
  if(top.length){
    wb.style.display='block';
    wl.innerHTML=top.map(t=>
      '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #2d4a6e">'
      +'<span style="color:#e0f0ff">'+t.sc+' · <b>'+t.hand+'</b></span>'
      +'<span style="color:#f07d7d">錯 '+t.count+' 次 &nbsp;'
      +'<span class="ac-'+t.last_user+'" style="padding:1px 5px;border-radius:3px;font-size:10px">'+ACT_LABEL[t.last_user]+'</span>'
      +' → <span class="ac-'+t.real+'" style="padding:1px 5px;border-radius:3px;font-size:10px">'+ACT_LABEL[t.real]+'</span></span>'
      +'</div>'
    ).join('');
  } else { wb.style.display='none'; }
}
function resetStats(){
  if(!confirm('確定重置所有數據？')) return;
  localStorage.removeItem('gto2');
  localStorage.removeItem('gto_mistakes');
  renderStats(); renderHome();
}
function rstSc(name){const s=loadSt();delete s[name];saveSt(s);renderStats();}

// ===== INIT =====
renderHome();
</script>
